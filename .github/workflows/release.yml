name: Release UI

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/owe-ui
  DEVOPS_REPOSITORY: forgoes/owe-devops
  DEVOPS_VALUES_FILE: charts/owe/values.yaml
  DEVOPS_REPO_TOKEN: ${{ secrets.DEVOPS_REPO_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout devops repository
        if: ${{ env.DEVOPS_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEVOPS_REPOSITORY }}
          token: ${{ secrets.DEVOPS_REPO_TOKEN }}
          path: devops

      - name: Update UI image tag
        if: ${{ env.DEVOPS_REPO_TOKEN != '' }}
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import re

          values = Path("devops") / os.environ["DEVOPS_VALUES_FILE"]
          text = values.read_text()
          updated, replacements = re.subn(
              r'(repository: ghcr\.io/[^\n]+/owe-ui\n\s+tag: )[^\n]+',
              rf'\g<1>{os.environ["VERSION_TAG"]}',
              text,
              count=1,
          )
          if replacements != 1:
              raise SystemExit(f"Expected to update 1 UI tag in {values}, updated {replacements}.")
          if updated == text:
              print(f"UI tag already at {os.environ['VERSION_TAG']} in {values}.")
          else:
              values.write_text(updated)
              print(f"Updated UI tag in {values} to {os.environ['VERSION_TAG']}.")
          PY

      - name: Commit devops update
        if: ${{ env.DEVOPS_REPO_TOKEN != '' }}
        working-directory: devops
        run: |
          git status --short
          git diff -- ${{ env.DEVOPS_VALUES_FILE }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ${{ env.DEVOPS_VALUES_FILE }}
          git commit -m "chore: release owe-ui ${{ github.ref_name }}" || exit 0
          git push
